server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tdf-poule-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tdf_poule}
    username: ${DB_USER:tdf_poule}
    password: ${DB_PASSWORD:tdf_poule}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      # schema is owned by Flyway migrations, not Hibernate auto-DDL
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

logging:
  level:
    com.tdfpoule: INFO
    org.flywaydb: INFO
