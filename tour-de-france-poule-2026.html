<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

#tdf-poule * { box-sizing: border-box; }
#tdf-poule {
  --bg: #14161A;
  --surface: #1D2024;
  --surface2: #262A2F;
  --surface3: #303539;
  --text: #ECEAE3;
  --text-muted: #8C9094;
  --border: #34383D;
  --yellow: #F5D300;
  --green: #4FB97A;
  --red: #E8483A;
  --blue: #5B9BD9;
  --radius: 12px;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  border-radius: 16px;
  overflow: hidden;
  min-height: 480px;
  line-height: 1.45;
}
#tdf-poule .display { font-family: 'Archivo Black', 'Inter', sans-serif; letter-spacing: 0.01em; }
#tdf-poule .mono { font-family: 'JetBrains Mono', monospace; }
#tdf-poule a { color: inherit; }
#tdf-poule button { font-family: inherit; cursor: pointer; }
#tdf-poule input, #tdf-poule select, #tdf-poule textarea { font-family: inherit; }

/* ---------- layout shells ---------- */
.tp-shell { padding: 0; }
.tp-hero {
  background:
    repeating-linear-gradient(135deg, rgba(245,211,0,0.05) 0 2px, transparent 2px 14px),
    linear-gradient(180deg, #1A1D21, #14161A 85%);
  border-bottom: 1px solid var(--border);
  padding: 28px 28px 22px;
  position: relative;
}
.tp-hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.tp-eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:0.14em; color:var(--yellow); font-weight:700; }
.tp-title { font-size:26px; margin:4px 0 0; }
.tp-sub { color:var(--text-muted); font-size:13.5px; margin-top:6px; max-width:480px; }

/* km marker / bib tag signature element */
.tp-km {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:54px; height:54px; padding:0 10px;
  background:#fff; color:#15171A; border:3px solid var(--red);
  border-radius:6px; font-family:'Archivo Black',sans-serif; font-size:20px;
  position:relative; flex-shrink:0;
}
.tp-km::before, .tp-km::after {
  content:''; position:absolute; top:-4px; width:6px; height:6px; border-radius:50%;
  background:#9a9d97;
}
.tp-km::before{ left:6px; } .tp-km::after{ right:6px; }
.tp-km-wrap { display:flex; align-items:center; gap:12px; }
.tp-km-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; }
.tp-km-stage { font-size:14px; color:var(--text); font-weight:600; margin-top:2px; }

.tp-bibtag {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:30px; height:30px; padding:0 7px;
  background:#fff; color:#15171A; border:2px solid #15171A;
  border-radius:5px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px;
  position:relative; flex-shrink:0;
}
.tp-bibtag::before, .tp-bibtag::after {
  content:''; position:absolute; top:-3px; width:4px; height:4px; border-radius:50%; background:#9a9d97;
}
.tp-bibtag::before{ left:4px; } .tp-bibtag::after{ right:4px; }
.tp-bibtag.gold { border-color: var(--yellow); }
.tp-bibtag.silver { border-color: #C7CACD; }
.tp-bibtag.bronze { border-color: #C98A4B; }

/* progress / route line */
.tp-route { display:flex; gap:3px; margin-top:18px; }
.tp-route-seg { flex:1; height:6px; border-radius:3px; background: var(--surface3); }
.tp-route-seg.done { background: var(--yellow); }

.tp-body { padding: 22px 28px 30px; }
.tp-center { max-width: 460px; margin: 40px auto; padding: 0 20px; }

/* ---------- nav tabs ---------- */
.tp-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
.tp-tab {
  background:var(--surface); border:1px solid var(--border); color:var(--text-muted);
  padding:8px 14px; border-radius:999px; font-size:13px; font-weight:600;
}
.tp-tab.active { background:var(--yellow); color:#15171A; border-color:var(--yellow); }
.tp-tab:hover:not(.active) { color:var(--text); border-color:#4a4f54; }

/* ---------- cards / forms ---------- */
.tp-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.tp-card + .tp-card { margin-top:16px; }
.tp-field { margin-bottom:14px; }
.tp-field label { display:block; font-size:12.5px; color:var(--text-muted); margin-bottom:5px; font-weight:600; }
.tp-input, .tp-select, .tp-textarea {
  width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:14px;
}
.tp-input:focus, .tp-select:focus, .tp-textarea:focus { outline:2px solid var(--yellow); outline-offset:1px; border-color:var(--yellow); }
.tp-row { display:flex; gap:12px; flex-wrap:wrap; }
.tp-row > * { flex:1; min-width:140px; }
.tp-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:var(--yellow); color:#15171A; border:none; font-weight:700; font-size:14px;
  padding:11px 18px; border-radius:8px; transition:filter .15s;
}
.tp-btn:hover { filter:brightness(1.08); }
.tp-btn:disabled { background:var(--surface3); color:var(--text-muted); cursor:not-allowed; }
.tp-btn.secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.tp-btn.danger { background:var(--red); color:#fff; }
.tp-btn.small { padding:6px 12px; font-size:12.5px; }
.tp-link-btn { background:none; border:none; color:var(--text-muted); font-size:13px; text-decoration:underline; padding:0; }
.tp-link-btn:hover { color:var(--text); }
.tp-error { background:rgba(232,72,58,0.12); border:1px solid var(--red); color:#ffb4ac; padding:10px 14px; border-radius:8px; font-size:13.5px; margin-bottom:14px; }
.tp-note { font-size:12.5px; color:var(--text-muted); margin-top:8px; }
.tp-pill { display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:11.5px; font-weight:700; }
.tp-pill.yellow { background:var(--yellow); color:#15171A; }
.tp-pill.green { background:var(--green); color:#0c1f13; }
.tp-pill.muted { background:var(--surface3); color:var(--text-muted); }

/* ---------- team builder ---------- */
.tp-budget-bar { position:sticky; top:0; z-index:5; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; margin-bottom:16px; }
.tp-budget-meter { height:10px; background:var(--surface3); border-radius:5px; overflow:hidden; margin-top:8px; }
.tp-budget-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--yellow)); transition:width .2s; }
.tp-budget-fill.over { background:var(--red); }
.tp-filters { display:flex; gap:8px; flex-wrap:wrap; margin:14px 0; }
.tp-chip { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); padding:5px 12px; border-radius:999px; font-size:12.5px; font-weight:600; }
.tp-chip.active { background:var(--text); color:#15171A; border-color:var(--text); }
.tp-rider-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
.tp-rider-card { background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:10px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; }
.tp-rider-card:hover { border-color:#4a4f54; }
.tp-stage-row { transition: border-color .15s, transform .1s; }
.tp-stage-row:hover { border-color: var(--yellow); }
.tp-stage-row:active { transform: scale(0.997); }
.tp-rider-card.selected { border-color:var(--yellow); background:rgba(245,211,0,0.07); }
.tp-rider-card.disabled { opacity:0.4; cursor:not-allowed; }
.tp-rider-name { font-size:13.5px; font-weight:700; }
.tp-rider-meta { font-size:11.5px; color:var(--text-muted); margin-top:1px; }
.tp-rider-price { margin-left:auto; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; background:var(--surface3); padding:3px 8px; border-radius:6px; flex-shrink:0; }
.tp-checkbox { width:16px; height:16px; flex-shrink:0; accent-color:var(--yellow); }

/* ---------- leaderboard ---------- */
.tp-lb-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.tp-lb-row:last-child { border-bottom:none; }
.tp-lb-bar-wrap { flex:1; min-width:0; }
.tp-lb-name { font-weight:700; font-size:14px; display:flex; align-items:center; gap:7px;}
.tp-lb-bar-bg { height:8px; background:var(--surface3); border-radius:4px; margin-top:5px; overflow:hidden; }
.tp-lb-bar-fill { height:100%; background:linear-gradient(90deg,var(--yellow),#ffe98a); border-radius:4px; }
.tp-lb-score { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; min-width:54px; text-align:right; }
.tp-you { background:rgba(245,211,0,0.1); border:1px solid var(--yellow); border-radius:4px; padding:1px 6px; font-size:10px; font-weight:700; color:var(--yellow); }

/* ---------- table ---------- */
.tp-table { width:100%; border-collapse:collapse; font-size:13px; }
.tp-table th { text-align:left; color:var(--text-muted); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; padding:6px 8px; border-bottom:1px solid var(--border); }
.tp-table td { padding:7px 8px; border-bottom:1px solid var(--border); }
.tp-table tr:last-child td { border-bottom:none; }
.tp-scroll { max-height:380px; overflow-y:auto; }

/* ---------- stage results entry grid ---------- */
.tp-place-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.tp-place-cell label { font-size:11px; color:var(--text-muted); display:block; margin-bottom:3px; }
.tp-jersey-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:14px; }
.tp-jersey-cell label { font-size:11px; display:flex; align-items:center; gap:5px; margin-bottom:3px; font-weight:700; }
.tp-dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
.tp-dot.yellow{background:var(--yellow);} .tp-dot.green{background:var(--green);} .tp-dot.polka{background:var(--red);} .tp-dot.white{background:#fff;border:1px solid #999;}

@media (max-width: 640px) {
  .tp-place-grid { grid-template-columns:repeat(3,1fr); }
  .tp-jersey-grid { grid-template-columns:repeat(2,1fr); }
  .tp-hero { padding:22px 18px 18px; }
  .tp-body { padding:18px 18px 26px; }
}
</style>

  /* ============================ STORAGE HELPERS ============================ */

  function withTimeout(promise, ms, fallback){
    return new Promise(resolve => {
      let settled = false;
      const t = setTimeout(() => { if(!settled){ settled = true; state.storageWarn = true; resolve(fallback); } }, ms);
      promise.then(v => { if(!settled){ settled = true; clearTimeout(t); resolve(v); } })
             .catch(() => { if(!settled){ settled = true; clearTimeout(t); state.storageWarn = true; resolve(fallback); } });
    });
  }

  // Detect whether the shared persistent storage API actually exists in this runtime.
  // If it doesn't, fall back to an in-memory store so the app still works for this
  // tab/session instead of crashing -- it just won't be shared with anyone else or
  // survive a reload.
  const useRealStorage = !!(typeof window !== "undefined" && window.storage &&
    typeof window.storage.get === "function" &&
    typeof window.storage.set === "function" &&
    typeof window.storage.list === "function");

  const memoryStore = {};
  function memKey(key, shared){ return (shared?"S:":"P:") + key; }

  async function sGet(key, shared){
    if(!useRealStorage){
      const raw = memoryStore[memKey(key,shared)];
      return raw == null ? null : JSON.parse(raw);
    }
    return withTimeout(
      window.storage.get(key, !!shared).then(r => r ? JSON.parse(r.value) : null),
      7000, null
    );
  }
  async function sSet(key, value, shared){
    if(!useRealStorage){
      memoryStore[memKey(key,shared)] = JSON.stringify(value);
      return true;
    }
    return withTimeout(
      window.storage.set(key, JSON.stringify(value), !!shared).then(r => !!r),
      7000, false
    );
  }
  async function sList(prefix, shared){
    if(!useRealStorage){
      const pfx = memKey(prefix, shared);
      return Object.keys(memoryStore).filter(k=>k.startsWith(pfx)).map(k=>k.slice(2));
    }
    return withTimeout(
      window.storage.list(prefix, !!shared).then(r => r ? r.keys : []),
      7000, []
    );
  }
  async function sDelete(key, shared){
    if(!useRealStorage || typeof window.storage.delete !== "function"){
      delete memoryStore[memKey(key,shared)];
      return true;
    }
    return withTimeout(
      window.storage.delete(key, !!shared).then(r => !!r),
      7000, false
    );
  }

  const ridersKey = code => `riders:${code}`;
  const pouleKey = code => `poule:${code}`;
  const teamKey = (code,user) => `team:${code}:${user.toLowerCase()}`;

  function genCode(){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s = "";
    for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  /* ============================ SCORING LOGIC ============================ */
  function rosterAtStage(team, stageNum){
    let roster = team.riders.slice();
    const swaps = (team.swapLog||[]).slice().sort((a,b)=>a.effectiveFromStage-b.effectiveFromStage);
    for(const sw of swaps){
      if(sw.effectiveFromStage <= stageNum){
        const idx = roster.indexOf(sw.outId);
        if(idx !== -1) roster[idx] = sw.inId;
        else if(!roster.includes(sw.inId)) roster.push(sw.inId);
      }
    }
    return roster;
  }

  function computeStagePoints(finishOrder, jerseys){
    const pts = {};
    (finishOrder||[]).forEach((rid, idx) => {
      if(!rid) return;
      pts[rid] = (pts[rid]||0) + (FINISH_POINTS[idx]||0);
    });
    Object.entries(jerseys||{}).forEach(([j, rid]) => {
      if(!rid) return;
      pts[rid] = (pts[rid]||0) + (JERSEY_BONUS[j]||0);
    });
    return pts;
  }

  function teamTotal(team, stages){
    let total = 0;
    const breakdown = [];
    for(const stage of stages){
      if(!stage.locked) continue;
      const roster = rosterAtStage(team, stage.n);
      let stagePts = 0;
      for(const rid of roster) stagePts += (stage.pointsByRider && stage.pointsByRider[rid]) || 0;
      breakdown.push({stage: stage.n, points: stagePts});
      total += stagePts;
    }
    return {total, breakdown};
  }

  /* ---------- CSV stage-result import ---------- */
  function normalizeName(s){
    return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim().replace(/\s+/g," ");
  }
  function findRiderByName(name){
    const norm = normalizeName(name);
    if(!norm) return null;
    let found = state.riders.find(r => normalizeName(r.name) === norm);
    if(found) return found;
    // forgiving fallback: match on surname/single word if it's unambiguous
    const matches = state.riders.filter(r => {
      const parts = normalizeName(r.name).split(" ");
      return parts[parts.length-1] === norm || parts.includes(norm);
    });
    return matches.length === 1 ? matches[0] : null;
  }
  const CSV_HEADER_WORDS = ["place","plaats","positie","rider","renner","naam","name"];
  const JERSEY_KEYS = ["yellow","green","polka","white"];
  function parseStageCSV(text){
    const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
    const finishOrder = Array.from({length:15}, ()=>null);
    const gcOrder = Array.from({length:10}, ()=>null);
    const jerseys = { yellow:"", green:"", polka:"", white:"" };
    const unmatched = [];
    let rows = 0;
    for(const line of lines){
      const idx = line.indexOf(",");
      if(idx === -1) continue;
      const rawKey = line.slice(0,idx).trim().toLowerCase();
      const rawName = line.slice(idx+1).trim();
      if(CSV_HEADER_WORDS.includes(rawKey)) continue;
      if(!rawName) continue;
      let slotType = null, slotIndex = null;
      const gcMatch = rawKey.match(/^gc\s*(\d{1,2})$/);
      if(JERSEY_KEYS.includes(rawKey)){ slotType = "jersey"; slotIndex = rawKey; }
      else if(gcMatch){ const g = parseInt(gcMatch[1],10); if(g>=1 && g<=10){ slotType = "gc"; slotIndex = g-1; } }
      else {
        const n = parseInt(rawKey,10);
        if(!isNaN(n) && n>=1 && n<=15){ slotType = "place"; slotIndex = n-1; }
      }
      if(!slotType) continue; // unrecognized key, silently skip rather than error
      rows++;
      const rider = findRiderByName(rawName);
      if(!rider){ unmatched.push(rawName); continue; }
      if(slotType==="place") finishOrder[slotIndex] = rider.id;
      else if(slotType==="gc") gcOrder[slotIndex] = rider.id;
      else jerseys[slotIndex] = rider.id;
    }
    return { finishOrder, gcOrder, jerseys, rows, unmatched };
  }

  async function saveStageResult(stageNum, finishOrder, jerseys, gcOrder){
    const p = state.poule;
    const pointsByRider = computeStagePoints(finishOrder, jerseys);
    p.stages[stageNum-1] = { ...p.stages[stageNum-1], top: finishOrder.filter(Boolean), gc: (gcOrder||[]).filter(Boolean), jerseys, pointsByRider, locked: true };
    p.currentStage = Math.max(p.currentStage, stageNum);
    await sSet(pouleKey(state.code), p, true);
    state.leaderboardCache = null;
  }

  // Build a schematic road profile as an array of {x,y} points (0..1 normalized),
  // shaped to reflect the stage's actual character. Not surveyed elevation data --
  // an honest illustration of the day's terrain derived from type + total climbing.
  function profileShape(stage){
    const tag = stage.tag;
    const pts = [];
    const push = (x,y) => pts.push({x, y});
    if(tag === "Flat"){
      // mostly flat with gentle undulation
      for(let i=0;i<=40;i++){ const x=i/40; const y=0.18 + 0.06*Math.sin(x*9) + 0.04*Math.sin(x*23); push(x,y); }
    } else if(tag === "TTT" || tag === "ITT"){
      // short, two little bumps near the end (Montjuïc-style) or a steady drag
      for(let i=0;i<=40;i++){ const x=i/40; let y=0.15 + 0.05*Math.sin(x*7); if(x>0.6) y += 0.25*Math.max(0,Math.sin((x-0.6)*Math.PI/0.4)); push(x,y); }
    } else if(tag === "Hilly"){
      // several rolling climbs, finish not at the very top
      for(let i=0;i<=48;i++){ const x=i/48; const base=0.22 + 0.30*Math.pow(x,0.7); const roll=0.16*Math.abs(Math.sin(x*7)); let y=base*0.5 + roll + 0.10*Math.sin(x*15); push(x, Math.min(0.8,y)); }
    } else { // Mountain
      // big climbs building to a summit finish, with a dip before the final ramp
      for(let i=0;i<=52;i++){
        const x=i/52;
        let y = 0.15 + 0.62*Math.pow(x,1.4);           // overall upward trend
        y += 0.10*Math.sin(x*8);                        // intermediate cols
        if(x>0.72){
          // valley dip into the foot of the final climb, then a steep ramp to the line
          const f=(x-0.72)/0.28;
          const ramp = f<0.18 ? (0.4 - f/0.18*0.12) : (0.28 + (f-0.18)/0.82*0.68);
          y = Math.max(y*0.6, ramp);
        }
        push(x, Math.min(0.97, Math.max(0.12,y)));
      }
    }
    return pts;
  }

  function profileSVG(stage){
    const W=600, H=150, padL=8, padR=8, padB=22, padT=10;
    const pts = profileShape(stage);
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const X = x => padL + x*innerW;
    const Y = y => padT + (1-y)*innerH;
    const line = pts.map((p,i)=> `${i===0?"M":"L"}${X(p.x).toFixed(1)},${Y(p.y).toFixed(1)}`).join(" ");
    const area = `${line} L${X(1).toFixed(1)},${Y(0).toFixed(1)} L${X(0).toFixed(1)},${Y(0).toFixed(1)} Z`;
    // colour by intensity of the day
    const fill = stage.tag==="Mountain" ? "var(--red)" : stage.tag==="Hilly" ? "#E8A33A" : stage.tag==="Flat" ? "var(--green)" : "var(--blue)";
    // distance ticks
    const km = stage.km || 0;
    const ticks = [];
    if(km){ for(let d=0; d<=km; d+=Math.max(25, Math.round(km/6/25)*25)){ ticks.push(d); } if(ticks[ticks.length-1]!==km) ticks.push(km); }
    const tickEls = ticks.map(d => {
      const x = X(d/km);
      return `<line x1="${x.toFixed(1)}" y1="${(H-padB).toFixed(1)}" x2="${x.toFixed(1)}" y2="${(H-padB+4).toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
        <text x="${x.toFixed(1)}" y="${(H-padB+15).toFixed(1)}" fill="var(--text-muted)" font-size="10" font-family="monospace" text-anchor="middle">${d}</text>`;
    }).join("");
    // start/finish markers
    const startY = Y(pts[0].y), finishY = Y(pts[pts.length-1].y);
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs><linearGradient id="pg-${stage.n}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${fill}" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="${fill}" stop-opacity="0.05"/>
      </linearGradient></defs>
      <path d="${area}" fill="url(#pg-${stage.n})"/>
      <path d="${line}" fill="none" stroke="${fill}" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="${X(0).toFixed(1)}" cy="${startY.toFixed(1)}" r="3.5" fill="var(--text)"/>
      <circle cx="${X(1).toFixed(1)}" cy="${finishY.toFixed(1)}" r="4" fill="${fill}" stroke="var(--surface)" stroke-width="1.5"/>
      ${tickEls}
    </svg>`;
  }

  /* ---------- TAB: RESULTS (stage top 10 + GC top 10) ---------- */
  function tabResults(){
    const p = state.poule;
    const scored = p.stages.filter(s => s.locked);
    if(!scored.length){
      return `<div class="tp-card"><p class="tp-note">${t("results_none_scored")}</p></div>`;
    }
    const latestScored = scored[scored.length-1].n;
    const sel = state._resultsStageNum && p.stages[state._resultsStageNum-1].locked ? state._resultsStageNum : latestScored;
    const stage = p.stages[sel-1];
    const stageOpts = scored.map(s => `<option value="${s.n}" ${s.n===sel?"selected":""}>${t("stage_word")} ${s.n} &mdash; ${esc(s.label)}</option>`).join("");

    const nameOf = id => state.ridersById[id]?.name || id;
    const teamOf = id => state.ridersById[id]?.team || "";

  /* ============================ ACTIONS ============================ */
  /* ---------- "forgot my code" recovery: personal (non-shared) memory ---------- */
  /* ---------- backup / restore (workaround for environments without persistent storage) ---------- */
  async function buildBackup(){
    const code = state.code;
    const teamKeys = await sList(`team:${code}:`, true);
    const teams = {};
    for(const k of teamKeys){ const tm = await sGet(k, true); if(tm) teams[k] = tm; }
    return { v:1, code, poule: state.poule, riders: state.riders, teams };
  }
  function encodeBackup(obj){
    // base64 of the JSON so it's one safe copy-paste blob
    try { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
    catch(e){ return JSON.stringify(obj); }
  }
  function decodeBackup(str){
    const s = (str||"").trim();
    if(!s) return null;
    try { return JSON.parse(decodeURIComponent(escape(atob(s)))); }
    catch(e){ try { return JSON.parse(s); } catch(e2){ return null; } }
  }
  async function restoreFromBackup(data, username){
    if(!data || !data.poule || !data.code) return false;
    // write everything back to storage (best effort) so it re-shares if storage works
    await sSet(pouleKey(data.code), data.poule, true);
    await sSet(ridersKey(data.code), data.riders || [], true);
    if(data.teams){ for(const k of Object.keys(data.teams)){ await sSet(k, data.teams[k], true); } }
    // load into the current session
    state.code = data.code;
    state.poule = data.poule;
    state.riders = data.riders || [];
    state.ridersById = ridersIndex(state.riders);
    const uname = (username||"").trim();
    state.username = uname || (Object.values(data.teams||{})[0]?.username) || "organizer";
    const myTeam = data.teams ? data.teams[teamKey(data.code, state.username)] : null;
    state.isAdmin = false;
    if(myTeam){ state.team = myTeam; state.view = "dashboard"; state.tab = "team"; }
    else { state.team = null; state.pendingSelection = []; state.view = "build-team"; }
    rememberPoule(data.code, data.poule.name, state.username);
    return true;
  }

  async function rememberPoule(code, name, username){
    let list = (await sGet("my-poules", false)) || [];
    list = list.filter(p => !(p.code === code && p.username.toLowerCase() === username.toLowerCase()));
    list.unshift({ code, name, username, ts: Date.now() });
    list = list.slice(0, 20);
    await sSet("my-poules", list, false);
    state.myPoules = list;
  }
  async function forgetPoule(code, username){
    let list = (await sGet("my-poules", false)) || [];
    list = list.filter(p => !(p.code === code && p.username.toLowerCase() === username.toLowerCase()));
    await sSet("my-poules", list, false);
    state.myPoules = list;
    render();
  }
  async function deletePouleEverywhere(code){
    const teamKeys = await sList(`team:${code}:`, true);
    await Promise.all(teamKeys.map(k => sDelete(k, true)));
    await Promise.all([ sDelete(pouleKey(code), true), sDelete(ridersKey(code), true) ]);
    let list = (await sGet("my-poules", false)) || [];
    list = list.filter(p => p.code !== code);
    await sSet("my-poules", list, false);
    state.myPoules = list;
  }

  function bindEvents(){
    App.querySelectorAll("[data-action]").forEach(el => {
      const tag = el.tagName;
      if(tag !== "INPUT" && tag !== "SELECT" && tag !== "TEXTAREA") el.onclick = onClick;
    });
    const filterInput = App.querySelector('[data-action="filter-text"]');
    if(filterInput) filterInput.oninput = e => { state.filterText = e.target.value; render(); };
    const riderFilter = App.querySelector('[data-action="rider-filter"]');
    if(riderFilter) riderFilter.oninput = e => { state._riderFilter = e.target.value; render(); };
    const stageSelect = App.querySelector('[data-action="select-admin-stage"]');
    if(stageSelect) stageSelect.onchange = e => { state._adminStageNum = parseInt(e.target.value,10); state._csvResultMsg = null; render(); };
    const resultsSelect = App.querySelector('[data-action="select-results-stage"]');
    if(resultsSelect) resultsSelect.onchange = e => { state._resultsStageNum = parseInt(e.target.value,10); render(); };
    // Enter key triggers the primary action of the current screen, like a form submit would
    const enterMap = { create:"submit-create", join:"submit-join" };
    App.querySelectorAll('#tp-c-name,#tp-c-username,#tp-c-password,#tp-c-teamsize,#tp-c-budget,#tp-c-swaps').forEach(el => {
      el.onkeydown = e => { if(e.key === "Enter"){ e.preventDefault(); onClick({target: App.querySelector('[data-action="submit-create"]')}); } };
    });
    App.querySelectorAll('#tp-j-code,#tp-j-username').forEach(el => {
      el.onkeydown = e => { if(e.key === "Enter"){ e.preventDefault(); onClick({target: App.querySelector('[data-action="submit-join"]')}); } };
    });
    const adminPw = document.getElementById('tp-admin-pw');
    if(adminPw) adminPw.onkeydown = e => { if(e.key === "Enter"){ e.preventDefault(); onClick({target: App.querySelector('[data-action="submit-admin-unlock"]')}); } };
  }

  async function onClick(e){
    const el = e.target.closest ? e.target.closest("[data-action]") : e.target;
    if(!el) return;
    const action = el.dataset.action;
    state.error = null;
    try {
      if(action === "goto-create"){ state.view="create"; render(); return; }
      if(action === "set-lang"){ state.lang = el.dataset.lang; render(); return; }
      if(action === "goto-join"){ state.view="join"; render(); return; }
      if(action === "continue-remembered") return await continueRememberedPoule(el.dataset.code, el.dataset.username);
      if(action === "goto-home"){ state.view="home"; render(); return; }
      if(action === "leave-poule"){ Object.assign(state,{view:"home",code:null,username:null,poule:null,team:null,isAdmin:false,leaderboardCache:null}); render(); return; }
      if(action === "set-tab"){ state.tab = el.dataset.tab; state.stageDetail = null; if(state.tab==="leaderboard"){ state.leaderboardCache=null; render(); await loadLeaderboard(); return;} render(); return; }
      if(action === "open-stage"){ state.stageDetail = parseInt(el.dataset.stage,10); render(); return; }
      if(action === "close-stage"){ state.stageDetail = null; render(); return; }
      if(action === "set-admin-section"){ state.adminSection = el.dataset.sec; render(); return; }
      if(action === "toggle-rider") return doToggleRider(el.dataset.id);
      if(action === "filter-tag"){ state.filterTag = el.dataset.tag; render(); return; }
      if(action === "confirm-team") return await doConfirmTeam();
      if(action === "open-swap"){ state.swapOutId = el.dataset.id; render(); return; }
      if(action === "cancel-swap"){ state.swapOutId = null; render(); return; }
      if(action === "confirm-swap") return await doConfirmSwap();
      if(action === "copy-code"){ try{ await navigator.clipboard.writeText(state.code); }catch(err){} return; }
      if(action === "save-stage") return await doSaveStage(parseInt(el.dataset.stage,10));
      if(action === "import-stage-csv") return await doImportStageCSV(parseInt(el.dataset.stage,10));
      if(action === "add-rider") return doAddRider();
      if(action === "delete-rider") return await doDeleteRider(el.dataset.id);
      if(action === "save-riders") return await doSaveRidersFromTable();
      if(action === "bulk-import") return await doBulkImport();
      if(action === "submit-create") return await doCreate();
      if(action === "submit-join") return await doJoin();
      if(action === "submit-admin-unlock") return await doAdminUnlock();
      if(action === "save-settings") return await doSaveSettings();
      if(action === "make-backup") return await doMakeBackup();
      if(action === "copy-backup-inline") return await doCopyBackupInline();
      if(action === "quick-backup") return await doMakeBackup();
      if(action === "do-restore") return await doRestore();
      if(action === "forget-remembered") return await forgetPoule(el.dataset.code, el.dataset.username);
      if(action === "ask-delete-poule"){ state._confirmDelete = true; render(); return; }
      if(action === "cancel-delete-poule"){ state._confirmDelete = false; render(); return; }
      if(action === "confirm-delete-poule") return await doDeletePoule();
    } catch(err){
      state.busy = false;
      state.error = t("something_wrong",{err: (err && err.message ? err.message : err)});
      render();
    }
  }

  async function doCreate(){
    const val = id => { const el = document.getElementById(id); return el ? el.value : ""; };
    const name = val("tp-c-name").trim();
    const username = val("tp-c-username").trim();
    const adminPassword = val("tp-c-password");
    const teamSize = parseInt(val("tp-c-teamsize"),10) || 9;
    const budgetCap = parseInt(val("tp-c-budget"),10) || 100;
    const totalSwaps = parseInt(val("tp-c-swaps"),10) || 0;
    if(!name || !username || !adminPassword){ state.error=t("err_create_fields"); render(); return; }
    state.busy = true; render();
    const code = genCode();
    const riders = RIDERS_SEED.map((r,i)=>({id:"r"+i, name:r.n, team:r.t, price:r.p, tag:r.g, active:true}));
    const poule = {
      code, name, createdAt: Date.now(), adminPassword,
      budgetCap, teamSize, totalSwaps, currentStage: 0,
      stages: STAGES_SEED.map(s => ({n:s.n, label:s.label, tag:s.tag, km:s.km, elev:s.elev, note:s.note, favorites:s.favorites, locked:false, top:[], jerseys:{}, pointsByRider:{}}))
    };
    const [ridersSaved, pouleSaved] = await Promise.all([
      sSet(ridersKey(code), riders, true),
      sSet(pouleKey(code), poule, true)
    ]);
    state.busy = false;
    state.code = code; state.username = username; state.poule = poule; state.riders = riders;
    state.ridersById = ridersIndex(riders); state.isAdmin = true;
    state.pendingSelection = []; state.view = "build-team";
    if(!ridersSaved || !pouleSaved) state.storageWarn = true;
    state._backupCode = encodeBackup({ v:1, code, poule, riders, teams:{} });
    render();
    rememberPoule(code, name, username);
  }

  async function enterPoule(code, username){
    state.busy = true; render();
    const [poule, riders, existingTeam] = await Promise.all([
      sGet(pouleKey(code), true),
      sGet(ridersKey(code), true),
      sGet(teamKey(code, username), true)
    ]);
    if(!poule){ state.busy=false; state.error=t("err_not_found"); render(); return; }
    state.busy = false;
    state.code = code; state.username = username; state.poule = poule;
    state.riders = riders || []; state.ridersById = ridersIndex(state.riders); state.isAdmin = false;
    if(existingTeam){
      state.team = existingTeam; state.view = "dashboard"; state.tab = "team";
    } else {
      state.pendingSelection = []; state.view = "build-team";
    }
    render();
    rememberPoule(code, poule.name, username);
  }

  async function doJoin(){
    const code = (document.getElementById("tp-j-code").value || "").trim().toUpperCase();
    const username = (document.getElementById("tp-j-username").value || "").trim();
    if(!code || !username){ state.error=t("err_join_fields"); render(); return; }
    await enterPoule(code, username);
  }

  async function continueRememberedPoule(code, username){
    await enterPoule(code, username);
  }

  function doToggleRider(id){
    const idx = state.pendingSelection.indexOf(id);
    const r = state.ridersById[id];
    const cap = state.poule.budgetCap, size = state.poule.teamSize;
    if(idx !== -1){ state.pendingSelection.splice(idx,1); render(); return; }
    const used = state.pendingSelection.reduce((s,i)=> s + (state.ridersById[i]?.price||0), 0);
    if(state.pendingSelection.length >= size || used + r.price > cap) return;
    state.pendingSelection.push(id);
    render();
  }

  async function doConfirmTeam(){
    const size = state.poule.teamSize;
    if(state.pendingSelection.length !== size) return;
    state.busy = true; render();
    const team = { username: state.username, riders: state.pendingSelection.slice(), swapsUsed:0, swapLog:[], joinedAt: Date.now() };
    await sSet(teamKey(state.code, state.username), team, true);
    state.busy = false;
    state.team = team; state.view = "dashboard"; state.tab = "team";
    render();
  }

  async function doConfirmSwap(){
    const sel = document.getElementById("tp-swap-in");
    const inId = sel ? sel.value : "";
    if(!inId) return;
    const p = state.poule, team = state.team;
    if((team.swapsUsed||0) >= p.totalSwaps) return;
    team.swapLog = team.swapLog || [];
    team.swapLog.push({ outId: state.swapOutId, inId, effectiveFromStage: p.currentStage + 1, ts: Date.now() });
    team.swapsUsed = (team.swapsUsed||0) + 1;
    await sSet(teamKey(state.code, state.username), team, true);
    state.swapOutId = null;
    render();
  }

  async function doAdminUnlock(){
    const pw = document.getElementById("tp-admin-pw").value;
    if(pw === state.poule.adminPassword){ state.isAdmin = true; render(); }
    else { state.error = t("err_password_mismatch"); render(); }
  }

  async function doSaveStage(stageNum){
    const placeSelects = App.querySelectorAll('[data-place]');
    const finishOrder = Array.from({length:15}, ()=>null);
    placeSelects.forEach(s => { finishOrder[parseInt(s.dataset.place,10)] = s.value || null; });
    const gcSelects = App.querySelectorAll('[data-gc]');
    const gcOrder = Array.from({length:10}, ()=>null);
    gcSelects.forEach(s => { gcOrder[parseInt(s.dataset.gc,10)] = s.value || null; });
    const jerseySelects = App.querySelectorAll('[data-jersey]');
    const jerseys = {};
    jerseySelects.forEach(s => { jerseys[s.dataset.jersey] = s.value || ""; });
    await saveStageResult(stageNum, finishOrder, jerseys, gcOrder);
    state._csvResultMsg = null;
    render();
  }

  async function doImportStageCSV(stageNum){
    const ta = document.getElementById("tp-stage-csv");
    const text = ta ? ta.value.trim() : "";
    if(!text){ state._csvResultMsg = t("csv_no_rows"); state._csvHasErrors = true; render(); return; }
    const { finishOrder, gcOrder, jerseys, rows, unmatched } = parseStageCSV(text);
    const matched = rows - unmatched.length;
    if(unmatched.length === 0 && rows > 0){
      await saveStageResult(stageNum, finishOrder, jerseys, gcOrder);
      state._csvResultMsg = t("csv_result_ok", {n:stageNum, matched, total:rows});
      state._csvHasErrors = false;
    } else {
      state._csvResultMsg = t("csv_result_errors", {n:stageNum, ok:matched, bad: esc(unmatched.join(", "))});
      state._csvHasErrors = true;
    }
    render();
  }

  function doAddRider(){
    const id = "rc" + Date.now();
    state.riders.push({ id, name: "New rider", team: "Unknown", price: 6, tag: "Domestique", active: true });
    state.ridersById[id] = state.riders[state.riders.length-1];
    render();
  }

  async function doDeleteRider(id){
    state.riders = state.riders.filter(r => r.id !== id);
    delete state.ridersById[id];
    await sSet(ridersKey(state.code), state.riders, true);
    render();
  }

  async function doSaveRidersFromTable(){
    App.querySelectorAll('[data-edit]').forEach(el => {
      const id = el.dataset.id, field = el.dataset.edit;
      const r = state.riders.find(x => x.id === id);
      if(!r) return;
      if(field === "price") r.price = parseInt(el.value,10) || 0;
      else if(field === "active") r.active = el.checked;
      else r[field] = el.value;
    });
    state.ridersById = ridersIndex(state.riders);
    await sSet(ridersKey(state.code), state.riders, true);
    render();
  }

  async function doBulkImport(){
    const text = document.getElementById("tp-bulk-import").value.trim();
    if(!text) return;
    const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
    const riders = lines.map((line, i) => {
      const [name, team, price, tag] = line.split(",").map(s => (s||"").trim());
      return { id: "ri"+i+"_"+Date.now(), name: name||"Unnamed", team: team||"Unknown", price: parseInt(price,10)||6, tag: tag||"Domestique", active: true };
    });
    state.riders = riders;
    state.ridersById = ridersIndex(riders);
    await sSet(ridersKey(state.code), riders, true);
    render();
  }

  async function doSaveSettings(){
    const p = state.poule;
    const val = id => { const el = document.getElementById(id); return el ? el.value : ""; };
    p.name = val("tp-s-name").trim() || p.name;
    p.teamSize = parseInt(val("tp-s-teamsize"),10) || p.teamSize;
    p.budgetCap = parseInt(val("tp-s-budget"),10) || p.budgetCap;
    p.totalSwaps = parseInt(val("tp-s-swaps"),10) || p.totalSwaps;
    await sSet(pouleKey(state.code), p, true);
    render();
  }

  async function doMakeBackup(){
    const backup = await buildBackup();
    state._backupCode = encodeBackup(backup);
    render();
    try { await navigator.clipboard.writeText(state._backupCode); state._backupCopied = true; render(); setTimeout(()=>{ state._backupCopied = false; render(); }, 2500); }
    catch(e){ /* clipboard may be blocked; the textarea still shows the code to copy manually */ }
  }

  async function doCopyBackupInline(){
    try { await navigator.clipboard.writeText(state._backupCode||""); state._backupCopied = true; render(); setTimeout(()=>{ state._backupCopied = false; render(); }, 2500); }
    catch(e){ /* clipboard may be blocked; the textarea still shows the code to copy manually */ }
  }

  async function doRestore(){
    const raw = (document.getElementById("tp-restore-in")||{}).value || "";
    const uname = (document.getElementById("tp-restore-name")||{}).value || "";
    const data = decodeBackup(raw);
    if(!data){ state.error = t("err_restore_failed"); render(); return; }
    state.busy = true; render();
    const ok = await restoreFromBackup(data, uname);
    state.busy = false;
    if(!ok){ state.error = t("err_restore_failed"); }
    render();
  }

  async function doDeletePoule(){
    const code = state.code;
    state.busy = true; render();
    await deletePouleEverywhere(code);
    state.busy = false;
    state._confirmDelete = false;
    Object.assign(state, { view:"home", code:null, username:null, poule:null, team:null, isAdmin:false, leaderboardCache:null, stageDetail:null });
    render();
  }

  /* ============================ INIT ============================ */
  render();
  loadMyPoules();
})();
</script>
